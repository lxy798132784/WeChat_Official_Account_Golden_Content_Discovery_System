name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix'
        required: true
        default: '1.0.0'
permissions:
  contents: write
jobs:
  linux-package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ qt6-base-dev qt6-tools-dev libgl1-mesa-dev libxkbcommon-dev zip
      - name: Package Linux
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          VERSION=$VERSION ./scripts/package-linux.sh
      - name: Source and docs bundles
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          mkdir -p dist/release
          git archive --format=tar.gz --prefix=premium-content-radar-$VERSION-source/ HEAD > dist/release/premium-content-radar-$VERSION-source.tar.gz
          git archive --format=zip --prefix=premium-content-radar-$VERSION-source/ HEAD > dist/release/premium-content-radar-$VERSION-source.zip
          zip -r dist/release/premium-content-radar-$VERSION-docs.zip README.md DEVELOPER_GUIDE.md docs LICENSE CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md CHANGELOG.md
          cp dist/linux-*/* dist/release/
          (cd dist/release && sha256sum * > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          generate_release_notes: true
